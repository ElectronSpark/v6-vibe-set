<!doctype html>
<meta charset="utf-8">
<title>xv6 WebKit WebGL Spherical Poly: loading</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #101722;
    color: #f8fafc;
    font: 18px sans-serif;
}
canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #050914;
}
#status {
    position: absolute;
    left: 24px;
    bottom: 22px;
    color: #cbd5e1;
}
#fallback {
    position: absolute;
    left: 24px;
    top: 22px;
    color: #93c5fd;
}
</style>
<canvas id="gl" width="960" height="600"></canvas>
<div id="fallback">spherical polygon WebGL demo</div>
<div id="status">initializing</div>
<script>
document.title = "xv6 WebKit WebGL Spherical Poly: script";

var canvas = document.getElementById("gl");
var statusNode = document.getElementById("status");
var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

function setStatus(text) {
    statusNode.textContent = text;
    document.title = "xv6 WebKit WebGL Spherical Poly: " + text;
}

function normalize(v) {
    var d = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
    return [v[0] / d, v[1] / d, v[2] / d];
}

function sub(a, b) {
    return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
}

function cross(a, b) {
    return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0]
    ];
}

function bary(a, b, c, ia, ib, ic, f) {
    return normalize([
        (a[0] * ia + b[0] * ib + c[0] * ic) / f,
        (a[1] * ia + b[1] * ib + c[1] * ic) / f,
        (a[2] * ia + b[2] * ib + c[2] * ic) / f
    ]);
}

function pushVertex(out, p, n) {
    out.push(p[0], p[1], p[2], n[0], n[1], n[2]);
}

function makePoly() {
    var q = 1.61803398875;
    var raw = [
        [-1, q, 0], [1, q, 0], [-1, -q, 0], [1, -q, 0],
        [0, -1, q], [0, 1, q], [0, -1, -q], [0, 1, -q],
        [q, 0, -1], [q, 0, 1], [-q, 0, -1], [-q, 0, 1]
    ];
    var base = [];
    var faces = [
        [0, 11, 5], [0, 5, 1], [0, 1, 7], [0, 7, 10], [0, 10, 11],
        [1, 5, 9], [5, 11, 4], [11, 10, 2], [10, 7, 6], [7, 1, 8],
        [3, 9, 4], [3, 4, 2], [3, 2, 6], [3, 6, 8], [3, 8, 9],
        [4, 9, 5], [2, 4, 11], [6, 2, 10], [8, 6, 7], [9, 8, 1]
    ];
    var f = 4;
    var out = [];
    var i;

    for (i = 0; i < raw.length; i++)
        base.push(normalize(raw[i]));

    function emit(a, b, c) {
        var n = normalize(cross(sub(b, a), sub(c, a)));
        var cx = (a[0] + b[0] + c[0]) / 3;
        var cy = (a[1] + b[1] + c[1]) / 3;
        var cz = (a[2] + b[2] + c[2]) / 3;
        var tmp;
        if (n[0] * cx + n[1] * cy + n[2] * cz < 0) {
            tmp = b;
            b = c;
            c = tmp;
            n = [-n[0], -n[1], -n[2]];
        }
        pushVertex(out, a, n);
        pushVertex(out, b, n);
        pushVertex(out, c, n);
    }

    for (i = 0; i < faces.length; i++) {
        var a = base[faces[i][0]];
        var b = base[faces[i][1]];
        var c = base[faces[i][2]];
        for (var row = 0; row < f; row++) {
            for (var col = 0; col < f - row; col++) {
                var p0 = bary(a, b, c, f - row - col, col, row, f);
                var p1 = bary(a, b, c, f - row - col - 1, col + 1, row, f);
                var p2 = bary(a, b, c, f - row - col - 1, col, row + 1, f);
                emit(p0, p1, p2);
                if (col < f - row - 1) {
                    var p3 = bary(a, b, c, f - row - col - 2, col + 1, row + 1, f);
                    emit(p1, p3, p2);
                }
            }
        }
    }
    return new Float32Array(out);
}

function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        throw new Error(gl.getShaderInfoLog(s));
    return s;
}

function matMul(a, b) {
    var r = new Float32Array(16);
    for (var col = 0; col < 4; col++) {
        for (var row = 0; row < 4; row++) {
            r[col * 4 + row] =
                a[row] * b[col * 4] +
                a[4 + row] * b[col * 4 + 1] +
                a[8 + row] * b[col * 4 + 2] +
                a[12 + row] * b[col * 4 + 3];
        }
    }
    return r;
}

function perspective(fovy, aspect, near, far) {
    var f = 1 / Math.tan(fovy / 2);
    var r = new Float32Array(16);
    r[0] = f / aspect;
    r[5] = f;
    r[10] = (far + near) / (near - far);
    r[11] = -1;
    r[14] = (2 * far * near) / (near - far);
    return r;
}

function translate(z) {
    var r = new Float32Array(16);
    r[0] = 1;
    r[5] = 1;
    r[10] = 1;
    r[15] = 1;
    r[14] = z;
    return r;
}

function rotate(t) {
    var sy = Math.sin(t);
    var cy = Math.cos(t);
    var sx = Math.sin(t * 0.37);
    var cx = Math.cos(t * 0.37);
    var y = new Float32Array([cy,0,-sy,0, 0,1,0,0, sy,0,cy,0, 0,0,0,1]);
    var x = new Float32Array([1,0,0,0, 0,cx,sx,0, 0,-sx,cx,0, 0,0,0,1]);
    return matMul(y, x);
}

try {
    if (!gl) {
        setStatus("webgl unavailable");
    } else {
        var program = gl.createProgram();
        gl.attachShader(program, compile(gl.VERTEX_SHADER,
            "attribute vec3 p; attribute vec3 n; uniform mat4 mvp; uniform mat4 model; varying vec3 vn; varying vec3 vp; void main(){ vec4 w=model*vec4(p,1.0); vp=w.xyz; vn=(model*vec4(n,0.0)).xyz; gl_Position=mvp*vec4(p,1.0); }"));
        gl.attachShader(program, compile(gl.FRAGMENT_SHADER,
            "precision mediump float; varying vec3 vn; varying vec3 vp; void main(){ vec3 n=normalize(vn); vec3 l=normalize(vec3(1.7,1.4,2.8)-vp); float d=max(dot(n,l),0.0); vec3 a=vec3(0.10,0.45,0.95); vec3 b=vec3(0.90,0.62,0.22); gl_FragColor=vec4(mix(a,b,n.y*.5+.5)*(0.18+d*.88),1.0); }"));
        gl.linkProgram(program);
        gl.useProgram(program);

        var vertices = makePoly();
        var buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        var pLoc = gl.getAttribLocation(program, "p");
        var nLoc = gl.getAttribLocation(program, "n");
        gl.enableVertexAttribArray(pLoc);
        gl.enableVertexAttribArray(nLoc);
        gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 24, 0);
        gl.vertexAttribPointer(nLoc, 3, gl.FLOAT, false, 24, 12);
        var mvpLoc = gl.getUniformLocation(program, "mvp");
        var modelLoc = gl.getUniformLocation(program, "model");
        gl.enable(gl.DEPTH_TEST);
        gl.enable(gl.CULL_FACE);
        gl.cullFace(gl.BACK);
        setStatus("webgl ready");

        var frame = 0;
        var maxFrames = 180;
        function draw(ts) {
            var t = ts / 1000;
            var model = rotate(t);
            var proj = perspective(Math.PI / 3.1, canvas.width / canvas.height, 0.1, 16);
            var mvp = matMul(matMul(proj, translate(-3.6)), model);
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.015, 0.022, 0.032, 1);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.uniformMatrix4fv(modelLoc, false, model);
            gl.uniformMatrix4fv(mvpLoc, false, mvp);
            gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 6);
            frame++;
            if (frame === 1)
                setStatus("webgl spherical poly");
            if (frame < maxFrames) {
                window.requestAnimationFrame(draw);
            } else {
                setStatus("webgl spherical poly complete");
            }
        }
        window.requestAnimationFrame(draw);
    }
} catch (e) {
    setStatus("webgl error " + e.message);
}
</script>
