<!doctype html>
<meta charset="utf-8">
<title>xv6 WebKit WebGL Smoke</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111827;
    color: #f8fafc;
    font: 18px sans-serif;
}
#layer {
    position: absolute;
    left: 96px;
    top: 96px;
    width: 320px;
    height: 220px;
    background: linear-gradient(135deg, #22c55e, #2563eb 55%, #f97316);
    transform: translateZ(0);
    animation: drift 2.8s linear infinite alternate;
}
#status {
    position: absolute;
    left: 24px;
    bottom: 24px;
}
canvas {
    position: absolute;
    right: 96px;
    top: 96px;
    width: 320px;
    height: 220px;
    background: #020617;
}
@keyframes drift {
    from { transform: translate3d(0, 0, 0) rotate(0deg); }
    to { transform: translate3d(180px, 120px, 0) rotate(18deg); }
}
</style>
<div id="layer"></div>
<canvas id="gl" width="320" height="220"></canvas>
<div id="status">initializing</div>
<script>
const status = document.getElementById("status");
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

if (!gl) {
    status.textContent = "webgl unavailable";
    document.title = "xv6 WebKit WebGL Smoke: unavailable";
} else {
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, "attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }");
    gl.compileShader(vs);
    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, "precision mediump float; uniform float t; void main(){ gl_FragColor=vec4(abs(sin(t)),0.45,abs(cos(t)),1.0); }");
    gl.compileShader(fs);
    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    gl.useProgram(program);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-0.7,-0.6, 0.7,-0.6, 0,0.7]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(program, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    const time = gl.getUniformLocation(program, "t");
    let frame = 0;
    function draw(ts) {
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.02, 0.03, 0.08, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform1f(time, ts / 400);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        frame++;
        status.textContent = "webgl frame " + frame;
        if (frame === 1)
            document.title = "xv6 WebKit WebGL Smoke: webgl";
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
}
</script>
